---
name: singularity
description: Fedora Atomic Hyprland image for AMD Ryzen 5800 iGPU laptop
base-image: ghcr.io/ublue-os/base-main
image-version: 42

modules:

  - type: containerfile
    snippets:
      - RUN rm -f /etc/yum.repos.d/negativo17-fedora-multimedia.repo

  - type: rpm-ostree
    install:
      - hyprland
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - xdg-user-dirs
      - hyprpaper
      - hyprlock
      - hypridle
      - waybar
      - rofi
      - foot
      - mako
      - grim
      - slurp
      - wl-clipboard
      - polkit-gnome
      - greetd
      - greetd-tuigreet
      - noto-fonts
      - noto-fonts-emoji
      - qt5-qtwayland
      - qt6-qtwayland
      - xorg-x11-server-Xwayland
      - NetworkManager-applet
      - bluez
      - bluez-tools
      - blueman
      - pipewire
      - pipewire-alsa
      - pipewire-pulseaudio
      - pipewire-jack-audio-connection-kit
      - wireplumber
      - pavucontrol
      - brightnessctl
      - power-profiles-daemon
      - fprintd
      - v4l-utils
      - mesa-va-drivers
      - mesa-vdpau-drivers
      - radeontop
      - btop
      - qemu-kvm
      - libvirt
      - libvirt-client
      - libvirt-daemon-config-network
      - virt-install
      - virt-manager
      - bridge-utils
      - dnsmasq
      - edk2-ovmf
      - swtpm
      - swtpm-tools
      - bash-completion
      - man-db
      - rsync
      - unzip
      - zip

  - type: systemd
    system:
      enabled:
        - bluetooth.service
        - fprintd.service
        - power-profiles-daemon.service
        - greetd.service
        - libvirtd.socket
        - libvirtd-ro.socket
        - libvirtd-admin.socket
