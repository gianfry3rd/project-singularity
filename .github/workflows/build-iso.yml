name: Build ISO

on:
  # Trigger automatically after a successful image build on main
  workflow_run:
    workflows:
      - Build Image
    types:
      - completed
    branches:
      - main
  # Or trigger manually with an optional tag override
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build ISO from'
        required: false
        default: 'latest'

jobs:
  build-iso:
    name: Build bootable ISO
    runs-on: ubuntu-latest
    # For workflow_run: only proceed if the upstream build succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ISO with build-container-installer
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: singularity
          image_repo: ghcr.io/gianfry3rd/singularity
          image_tag: ${{ github.event.inputs.image_tag || 'latest' }}
          version: 42
          variant: Silverblue
          iso_name: singularity-${{ github.run_number }}.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: singularity-iso-${{ github.run_number }}
          path: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}-CHECKSUM
          if-no-files-found: error
          retention-days: 7
